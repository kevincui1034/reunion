name: CI

# Keeps main always-green and always-runnable. Every push and PR must pass
# typecheck + contract/unit tests before it can be merged. This is the mechanical
# guarantee that the four work-streams compose.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (shape drift across seams)
        run: npm run typecheck

      - name: Tests (contract + unit + spine)
        run: npm test

      - name: Demo smoke (spine runs end-to-end)
        run: npm run demo
